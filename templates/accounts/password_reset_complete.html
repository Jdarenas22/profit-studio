{% extends 'base.html' %}
{% block title %}Contraseña actualizada — ProFit Studio{% endblock %}
{% block content %}
<section class="min-h-screen flex items-center justify-center py-20 bg-black">
  <div class="w-full max-w-md px-4">
    <div class="bg-zinc-900 border border-white/10 rounded-3xl p-8 sm:p-10 text-center">
      <div class="w-16 h-16 bg-green-500/10 border border-green-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <i class="fa fa-shield-check text-green-400 text-3xl"></i>
      </div>
      <h1 class="text-2xl font-black text-white mb-3">¡Contraseña actualizada!</h1>
      <p class="text-white/50 text-sm leading-relaxed mb-8">
        Tu contraseña fue cambiada correctamente. Ya puedes iniciar sesión con tu nueva contraseña.
      </p>
      <a href="{% url 'login' %}"
         class="inline-flex items-center gap-2 bg-primary hover:bg-primary-dark text-white font-bold px-8 py-3.5 rounded-xl transition-colors text-sm">
        <i class="fa fa-right-to-bracket"></i> Iniciar sesión
      </a>
    </div>
  </div>
</section>
{% endblock %}
